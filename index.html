es the emergency system"],"Warning":""},{"Course":"SY105","Number":1,"SlideId":"63CuznkvkkR","DisplayText":"Progress Check","Question":"What does using flaps in the landing setting allow you to do?","Choices":["Maintain approach glidepath while reducing airspeed","Decrease approach glidepath while increasing airspeed","Decrease approach glidepath while maintaining airspeed","Maintain approach glidepath while increasing airspeed"],"Answers":["Maintain approach glidepath while reducing airspeed"],"Warning":""},{"Course":"SY105","Number":2,"SlideId":"5lXiwzDRgaE","DisplayText":"Progress Check","Question":"What happens if the primary hydraulic system fails?","Choices":["The emergency system provides a one-time lowering and retraction of the flaps.","The flaps can be operated using the emergency system package.","The electrical FLAPS CONT circuit breaker must be reset.","The flaps cannot be used until they are serviced on the ground."],"Answers":["The flaps can be operated using the emergency system package."],"Warning":""},{"Course":"SY105","Number":3,"SlideId":"6M6MniX8Vc8","DisplayText":"Progress Check","Question":"Before operating the flaps using the emergency system, you must _________.","Choices":["lower the landing gear using the emergency system","check the Crew Alerting System (CAS) display for the BATT BUS advisory","raise your speed above 150 KIAS","check the flaps visually to find their position"],"Answers":["lower the landing gear using the emergency system."],"Warning":""},{"Course":"SY105","Number":4,"SlideId":"5fd0AiJ8p3t","DisplayText":"Progress Check","Question":"Which of the following is a critical limitation of the speed brake?","Choices":["The speed brake’s actuator is a part of the selector manifold.","The speed brake extends automatically if the PCL is moved to the MAX position.","The speed brake does not operate using the emergency hydraulic system.","The speed brake will only extend if the flaps are extended."],"Answers":["The speed brake does not operate using the emergency hydraulic system."],"Warning":""},{"Course":"SY105","Number":5,"SlideId":"6SfN5htG8LR","DisplayText":"Progress Check","Question":"Where does the pressure come from that creates the mechanical force to extend the speed brake?","Choices":["From the circuit breaker placarded SPEED BRAKE on the generator bus circuit breaker panel","From the turning of the torque tube","From the emergency accumulator","From the primary hydraulic system"],"Answers":["From the primary hydraulic system"],"Warning":""},{"Course":"SY105","Number":6,"SlideId":"5YFetzLkdDR","DisplayText":"Progress Check","Question":"Which of the following is an important difference between using the NWS or differential braking?","Choices":["NWS provides a tighter turn radius than differential braking.","Differential braking should be avoided above 20 knots.","NWS is more sensitive than differential braking.","Differential braking results in a wider turn radius than NWS."],"Answers":["NWS is more sensitive than differential braking."],"Warning":""},{"Course":"SY105","Number":7,"SlideId":"5f4PALbryV0","DisplayText":"Progress Check","Question":"What happens to NWS if the primary hydraulic system fails?","Choices":["The NWS system will be inoperative and use of rudder and/or differential braking on the ground will be necessary.","NWS sensitivity will increase because of differential pressure.","The pilot must manually deselect NWS.","The NWS receives its hydraulic pressure from the emergency accumulator."],"Answers":["The NWS system will be inoperative and use of rudder and/or differential braking on the ground will be necessary."],"Warning":""},{"Course":"SY105","Number":8,"SlideId":"5usDvv9MAtA","DisplayText":"Progress Check","Question":"Which is true regarding the wheel brake system?","Choices":["The wheel brake system shares the primary hydraulic system pressure lines.","The wheel brake system will continue to operate if the primary hydraulic system fails.","The wheel brakes are no ","Number":5,"SlideId":"6WqdaglmJky","DisplayText":"Review Question","Question":"What is the purpose of the elevator system?","Choices":[],"Answers":["It controls the pitch angle of the aircraft around the lateral (pitch) axis."],"Warning":""},{"Course":"SY106","Number":6,"SlideId":"5mB1e49EPnp","DisplayText":"Review Question","Question":"If you move the control stick forward in flight, how will the aircraft react?","Choices":[],"Answers":["Elevator trailing edge deflects downward and aircraft nose pitches down."],"Warning":""},{"Course":"SY106","Number":7,"SlideId":"5WmRu5jwQmH","DisplayText":"Review Question","Question":"What is the purpose of the rudder system?","Choices":[],"Answers":["It controls the aircraft’s yaw movement around the vertical (yaw) axis."],"Warning":""},{"Course":"SY106","Number":8,"SlideId":"6VQyvW7TzOr","DisplayText":"Review Question","Question":"What happens when you step on the right rudder pedal?","Choices":[],"Answers":["Moves tail left Causes aircraft nose to yaw right"],"Warning":""},{"Course":"SY106","Number":9,"SlideId":"6FjwparTBka","DisplayText":"Review Question","Question":"How does the pilot adjust the rudder pedals to position them at a more convenient setting?","Choices":[],"Answers":["By rotating the pedal adjustment hand crank.","Pedal Adjustment Hand Crank"],"Warning":""},{"Course":"SY106","Number":10,"SlideId":"6HX7fa062Ax","DisplayText":"Review Question","Question":"Which primary flight control surface actually moves as part of the trim system?","Choices":[],"Answers":["The ailerons"],"Warning":""},{"Course":"SY106","Number":11,"SlideId":"5iH9bivqYmJ","DisplayText":"Review Question","Question":"Where are the trim controls for the aileron trim setting, the elevator trim setting, and the rudder trim setting?","Choices":[],"Answers":["The elevator/aileron trim switch located at the top of each control stick The rudder trim switch located on the PCL in each cockpit","Elevator/Aileron Trim Switch","Arrow 1","Rudder Trim Switch","Arrow 2"],"Warning":""},{"Course":"SY106","Number":12,"SlideId":"5kWT12J6d19","DisplayText":"Review Question","Question":"What is the function of the trim disconnect switch?","Choices":[],"Answers":["It removes power from the trim system and disengages the Trim Aid Device."],"Warning":""},{"Course":"SY106","Number":13,"SlideId":"5vRYJqXH4nz","DisplayText":"Review Question","Question":"What are the indications the trim disconnect switch has been selected?","Choices":[],"Answers":["The green TRIM OFF and TAD OFF CAS advisories will illuminate."],"Warning":""},{"Course":"SY106","Number":14,"SlideId":"6CLryo7CHjw","DisplayText":"Review Question","Question":"How is electrical power provided to operate the aileron and elevator trim system?","Choices":[],"Answers":["Through a circuit breaker placarded AIL/EL TRIM located on the battery bus circuit breaker panel in the front cockpit."],"Warning":""},{"Course":"SY106","Number":15,"SlideId":"6QbsWoofuip","DisplayText":"Review Question","Question":"What four factors does the TAD computer consider when calculating the rudder trim setting?","Choices":[],"Answers":["Pitch rate Airspeed Altitude Engine torque"],"Warning":""},{"Course":"SY106","Number":16,"SlideId":"6KLkRENnqVo","DisplayText":"Review Question","Question":"If the gust lock is installed properly, how will the control surfaces appear when they are visually inspected?","Choices":[],"Answers":["The ailerons and rudder will be in a neutral position and the elevator will be in a nose-down position."],"Warning":""},{"Course":"SY106","Number":17,"SlideId":"6Qef1EsGZp0","DisplayText":"Review Question","Question":"What aircraft components are operated by the primary hydraulic system?","Choices":[],"Answers":["Landing gear and main gear inboard doors Flaps Speed brake Nose wheel steering"],"Warning":""},{"Course":"SY106","Number":18,"SlideId":"6iZlgw7E3yq","DisplayText":"Review Question","Question":"Which component is the source of pressure for the primary hydraulic system?" lector handle Pull the emergency landing gear extension handle"],"Warning":""},{"Course":"SY106","Number":26,"SlideId":"6lrVcXiunVI","DisplayText":"Review Question","Question":"What is the maximum flap operating speed?","Choices":[],"Answers":["150 KIAS"],"Warning":""},{"Course":"SY106","Number":27,"SlideId":"5i3Cm7fsJSQ","DisplayText":"Review Question","Question":"Can the flaps be operated in the event the primary hydraulic system fails?","Choices":[],"Answers":["Yes, after the landing gear has been lowered using the emergency system."],"Warning":""},{"Course":"SY106","Number":28,"SlideId":"6Ng7YDvPqJp","DisplayText":"Review Question","Question":"What is the purpose of the speed brake?","Choices":[],"Answers":["The speed brake allows you to decelerate. It also allows you to increase descent rate without increasing your airspeed."],"Warning":""},{"Course":"SY106","Number":29,"SlideId":"6QbJ8XzXhTz","DisplayText":"Review Question","Question":"Where is the SPEED BRAKE circuit breaker located?","Choices":[],"Answers":["On the front cockpit generator bus circuit breaker panel."],"Warning":""},{"Course":"SY106","Number":30,"SlideId":"6F4FrSw5VjT","DisplayText":"Review Question","Question":"What can happen if NWS is engaged at high taxi speeds?","Choices":[],"Answers":["It can result in directional control problems due to increased sensitivity."],"Warning":""},{"Course":"SY106","Number":31,"SlideId":"5zGWrEFFSsk","DisplayText":"Review Question","Question":"Which has a larger turn radius, nose wheel steering or differential braking?","Choices":[],"Answers":["Nose wheel steering","Nose Wheel Steering Click play on the video to view this example.","Differential Braking Click play on the video to view this example."],"Warning":""},{"Course":"SY106","Number":32,"SlideId":"6gBuBd4hSQy","DisplayText":"Review Question","Question":"What are the indications of abnormal primary flight control operations?","Choices":[],"Answers":["Uncommanded pitch, roll or yaw movements Sluggish response to control inputs"],"Warning":""},{"Course":"SY106","Number":33,"SlideId":"6FtK6TWcsdW","DisplayText":"Review Question","Question":"What is the corrective action to take in the case of runaway trim?","Choices":[],"Answers":["Perform runaway trim checklist procedures."],"Warning":""},{"Course":"SY106","Number":34,"SlideId":"5swE1gOkFGh","DisplayText":"Review Question","Question":"If the EHYD PX LO illuminates, what aircraft devices should you consider inoperative?","Choices":[],"Answers":["Emergency landing gear and flap extension"],"Warning":""},{"Course":"SY106","Number":35,"SlideId":"62VazfbXEPn","DisplayText":"Review Question","Question":"What are some indications of unsafe landing gear?","Choices":[],"Answers":["Indicator lights Lack of noticeable drag Lack of noticeable noise Inability to turn on landing or taxi lights Tendency to roll (main gear)"],"Warning":""},{"Course":"SY106","Number":36,"SlideId":"5oxdu3PQXty","DisplayText":"Review Question","Question":"What indicator lights would illuminate with the main landing gear full down, the nose gear still fully retracted, and the PCL above IDLE?","Choices":[],"Answers":["Two green mains, two red mains, red gear handle light."],"Warning":""},{"Course":"SY106","Number":37,"SlideId":"6MOeXrLwI6u","DisplayText":"Review Question","Question":"When lowering flaps using the emergency system, what two conditions might result?","Choices":[],"Answers":["The flaps might extend only partially and they may take longer to extend."],"Warning":""},{"Course":"SY106","Number":38,"SlideId":"6L8crSbDBdu","DisplayText":"Review Question","Question":"What are indications of wheel brake failure?","Choices":[],"Answers":["Inability to maintain directional control Inability to decelerate “Spongy” or soft brake pedal The aircraft pulls to one side"],"Warning":""},{"Course":"SY108","Number":1,"SlideId":"5jJQWKYWZzb","DisplayText":"Progress Check","Question":"The T-6C is NOT equipped with which of the following radio navigation systems a."],"Answers":["Both bearing pointers may be turned off."],"Warning":""},{"Course":"SY108","Number":11,"SlideId":"5kkzrZRdGGN","DisplayText":"Progress Check","Question":"The backup flight instrument can be used for a limited time in the event of a failure of the aircraft primary _________ system(s).","Choices":["hydraulic","environmental","electrical","propulsion"],"Answers":["electrical"],"Warning":""},{"Course":"SY108","Number":12,"SlideId":"5ucIrR5WUua","DisplayText":"Progress Check","Question":"The airspeed indicator on the backup flight instrument is marked in increments of _________ knots.","Choices":["25","20","10","5"],"Answers":["10"],"Warning":""},{"Course":"SY108","Number":13,"SlideId":"6cJRp4Q0Zx7","DisplayText":"Progress Check","Question":"The altimeter on the backup flight instrument _________.","Choices":["can be switched between a digital readout or a moving tape","is both a digital readout and a moving tape","is a moving tape and triangular pointer","is a digital readout only"],"Answers":["is both a digital readout and a moving tape"],"Warning":""},{"Course":"SY108","Number":14,"SlideId":"6NcrX7GZ6Xl","DisplayText":"Progress Check","Question":"The backup flight instrument attitude indicator gyro inputs come from _________.","Choices":["both its own reference source and the integrated avionics system","its own internal three-axis reference source","the Global Positioning System (GPS)","the integrated avionics system Inertial Reference Unit (IRU)"],"Answers":["its own internal three-axis reference source"],"Warning":""},{"Course":"SY109","Number":1,"SlideId":"5UslR9sc0Oc","DisplayText":"Progress Check","Question":"The master warning and master caution switchlights are interconnected with the _________.","Choices":["environmental control panel","trim control panel","crew alerting system (CAS) messages","engine/electrical switch panel"],"Answers":["crew alerting system (CAS) messages"],"Warning":""},{"Course":"SY109","Number":2,"SlideId":"5oGDYtuwbiS", y.","Choices":["False","True"],"Answers":["False"],"Warning":""},{"Course":"SY111","Number":11,"SlideId":"6BybFaZzQkO","DisplayText":"Progress Check","Question":"What effect will rotating the bypass switch to the EMR position have on the V/UHF radio?","Choices":["The active frequency will switch to the alternative frequency.","Radio control will revert to backup control unit.","The audio will be unamplified, raw audio.","You will not be able to hear the audio."],"Answers":["The audio will be unamplified, raw audio."],"Warning":""},{"Course":"SY111","Number":12,"SlideId":"5qkBrRTyfAt","DisplayText":"Progress Check","Question":"When the _________ key is pressed, the UFCP automatically displays the following data:","Choices":["NAV TUNE","COM2","MRK","SYS"],"Answers":["COM2"],"Warning":""},{"Course":"SY111","Number":13,"SlideId":"6dLOX25GgNm","DisplayText":"Progress Check","Question":"What character indicates an active edit in a data entry window?","Choices":["3","\u003c","="],"Answers":["3"],"Warning":""},{"Course":"SY111","Number":14,"SlideId":"6hzpDp0tOII","DisplayText":"Progress Check","Question":"What indication, if any, is given for a frequency that does not correspond to a preset:","Choices":["XX","**","\u003c","##"],"Answers":["##"],"Warning":""},{"Course":"SY111","Number":15,"SlideId":"5pWmZJRrMAv","DisplayText":"Progress Check","Question":"If you wish to modify an existing VHF library record (preset 05), identifier FOX, and frequency 114.000 MHz (05/FOX/114.00) to a new frequency, 115.000 MHz, what would you enter into the scratchpad?","Choices":["115.000","/115.000/","115.000//","//115.000"],"Answers":["//115.000"],"Warning":""},{"Course":"SY111","Number":16,"SlideId":"6jIVXInyRBz","DisplayText":"Progress Check","Question":"With the transponder mode set to SBY, what information is being transmitted?","Choices":["Aircraft altitude","The transponder code and altitude","The transponder code","None"],"Answers":["None"],"Warning":""},{"Course":"SY111","Number":17, estion","Question":"How is the airspeed indicator operated?","Choices":[],"Answers":["By pitot and static pressure from the secondary pitot/static system","Pasted Image (1387x1212).emf"],"Warning":""},{"Course":"SY115","Number":11,"SlideId":"6UiNLLCewP9","DisplayText":"Review Question","Question":"The backup attitude indicator can be powered for a limited time in the event of a battery bus failure by what source?","Choices":[],"Answers":["Auxiliary battery"],"Warning":""},{"Course":"SY115","Number":12,"SlideId":"5s7BThHJYM7","DisplayText":"Review Question","Question":"The stick shaker is activated approximately how many knots above stall speed?","Choices":[],"Answers":["5 to 10 knots","Pasted Image (1388x378).emf"],"Warning":""},{"Course":"SY115","Number":13,"SlideId":"6C67S9n3eNx","DisplayText":"Review Question","Question":"What information does the EICAS display?","Choices":[],"Answers":["Fuel, electrical, and environmental Engine performance Crew Alerting System (CAS)","Pasted Image (1387x790).emf"],"Warning":""},{"Course":"SY115","Number":14,"SlideId":"6XzoeEqYlG2","DisplayText":"Review Question","Question":"When will either the MASTER WARN or MASTER CAUT switchlights illuminate?","Choices":[],"Answers":["Anytime a warning or caution annunciator illuminates in either cockpit The MASTER WARN switchlight will illuminate with the FIRE light.","OIL PX"],"Warning":""},{"Course":"SY115","Number":15,"SlideId":"69In1QtYD5e","DisplayText":"Review Question","Question":"What information is shown in the AOA display?","Choices":[],"Answers":["Approach angle target range Max endurance AOA pointer Max range AOA digital readout","Pasted Image (1387x622).emf"],"Warning":""},{"Course":"SY115","Number":16,"SlideId":"66X5CW5egsi","DisplayText":"Review Question","Question":"What indicates that the CVDR sytem is functioning normally?","Choices":[],"Answers":["The CVR and FDR annunciator lights will be green"],"Warning":""},{"Course":"SY115","Number":17,"SlideId":"5Uy1AKa6Bvw","Displa tion","Question":"If you are on approach, when will you get a TA?","Choices":[],"Answers":["Level A (landing gear extended) TA will be issued if: Vertical separation of less than 600 ft will occur in 20 seconds at current closing rate Vertical separation is less than 600 ft and horizontal separation is less than 0.2 NM Horizontal separation from non-altitude reporting intruder is less than 15 seconds or 0.2 NM"],"Warning":""},{"Course":"SY115","Number":37,"SlideId":"6g2u79O6jES","DisplayText":"Review Question","Question":"True or false? The TCAS system installed on the T-6C provides avoidance maneuver guidance.","Choices":[],"Answers":["False. This is a TCAS I system which does not provide avoidance maneuver guidance."],"Warning":""},{"Course":"SY115","Number":38,"SlideId":"6MnHOSieBh9","DisplayText":"Review Question","Question":"How is the TCAS range selected?","Choices":[],"Answers":["On the NAV display, LSK R3 increases the range displayed and LSK R4 decreases it."],"Warning":""},{"Course":"SY115","Number":39,"SlideId":"5tJSb3ejDfQ","DisplayText":"Review Question","Question":"Which key would you press to change your view to Rose Plan?","Choices":[],"Answers":["Press LSK LL twice.","Pasted Image (1388x930).emf"],"Warning":""},{"Course":"SY115","Number":40,"SlideId":"6TwLrADNlMv","DisplayText":"Review Question","Question":"Which top level FMS page is used to change VHF parameters?","Choices":[],"Answers":["FREQ"],"Warning":""},{"Course":"SY115","Number":41,"SlideId":"5V2yXBMJavG","DisplayText":"Review Question","Question":"True or false? The data in the scratchpad is erased when the information is pasted into an active field.","Choices":[],"Answers":["False. Data pasted into scratchpad will remain in the scratchpad until overwritten or erased."],"Warning":""},{"Course":"SY115","Number":42,"SlideId":"6gWggUYxpWe","DisplayText":"Review Question","Question":"True or false? This HSI indicates that the DME system has failed.","Choices":["Pasted Image (1388x1212).emf"]," s are necessary for engine operation?","Choices":["Air, fuel, and heat","Gas, oil, and heat","Air, oil, and fuel","Heat, smoke, and fire"],"Answers":["Air, fuel, and heat"],"Warning":""},{"Course":"SY204","Number":5,"SlideId":"6er2BVaWevn","DisplayText":"Progress Check","Question":"True or false? As exhaust is released, additional thrust is provided.","Choices":["False","True"],"Answers":["True"],"Warning":""},{"Course":"SY204","Number":6,"SlideId":"6I3kJyvfYU1","DisplayText":"Progress Check","Question":"True or false? Once the engine is started, and the ignition switch is in the ON position, igniters are automatically energized and de-energized by the PMU.","Choices":["False","True"],"Answers":["False"],"Warning":""},{"Course":"SY204","Number":7,"SlideId":"5XT8nUPJMMK","DisplayText":"Progress Check","Question":"The primary purpose of the ignition system is to _______________.","Choices":["turn the starter motor until combustion","ignite the air and fuel mixture in the combustion chamber","turn the compressor turbine until engine start","mix fuel and compressed air in the combustion chamber"],"Answers":["ignite the air and fuel mixture in the combustion chamber"],"Warning":""},{"Course":"SY204","Number":8,"SlideId":"6X4E3YfuLKl","DisplayText":"Progress Check","Question":"True or false? Friction control settings made to the front PCL affect the aft PCL.","Choices":["False","True"],"Answers":["True"],"Warning":""},{"Course":"SY204","Number":9,"SlideId":"5uqDOrRq3Kv","DisplayText":"Progress Check","Question":"When starting the T-6C, the PCL should be ______________.","Choices":["pushed forward until a green IGN SEL message is illuminated","pushed forward until a green ST READY message is illuminated","in the IDLE position","in the START/IDLE detent position"],"Answers":["pushed forward until a green ST READY message is illuminated"],"Warning":""},{"Course":"SY204","Number":10,"SlideId":"6MYsEWUulMG","DisplayText":"Progress Check","Question":"The PMU is located _________.","Choices":["in the front cockpit","in the left avionics bay","on the reduction gearbox, next to the propeller interface unit","underneath the engine, in the accessory compartment"],"Answers":["underneath the engine, in the accessory compartment"],"Warning":""},{"Course":"SY204","Number":11,"SlideId":"5ZVbjHeq3md","DisplayText":"Progress Check","Question":"The PMU performs the following functions, except:","Choices":["releases the correct amount of fuel","determines available power","processes power requests","maintains operating limits"],"Answers":["releases the correct amount of fuel"],"Warning":""},{"Course":"SY204","Number":12,"SlideId":"6WAGduAnbi8","DisplayText":"Progress Check","Question":"The PMU STATUS message illuminates after landing when the PMU _________.","Choices":["is monitoring engine operation","needs maintenance","is ready for operation","is regulating normal fuel flow"],"Answers":["needs maintenance"],"Warning":""},{"Course":"SY204","Number":13,"SlideId":"6P3sbt5WUav","DisplayText":"Progress Check","Question":"True or false? After engine start, the starter becomes a generator.","Choices":["False","True"],"Answers":["True"],"Warning":""},{"Course":"SY204","Number":14,"SlideId":"5tmh9JNvX6J","DisplayText":"Progress Check","Question":"True or false? The MANUAL starter switch position will be used under normal circumstances.","Choices":["False","True"],"Answers":["False"],"Warning":""},{"Course":"SY204","Number":15,"SlideId":"5tObPhhSK4G","DisplayText":"Progress Check","Question":"With the engine above IDLE power a red OIL PX message illuminates when oil pressure falls below _________ psi.","Choices":["55","50","40","35"],"Answers":["40"],"Warning":""},{"Course":"SY204","Number":16,"SlideId":"5ios6lRm9rF","DisplayText":"Progress Check","Question":"If oil pressure remains between 15 and 40 psi at IDLE power for more than 5 seconds,__________will be illuminated.","Choices":["neither OIL PX message","both the yellow and red OIL PX messages","the red ,"DisplayText":"Progress Check","Question":"In the event of an out-of-limits torque indication, the EICAS display will warn the pilot by all the following methods except _________.","Choices":["a 3-second blank screen","the flashing MASTER WARN light","a change in color","an aural tone"],"Answers":["a 3-second blank screen"],"Warning":""},{"Course":"SY205","Number":7,"SlideId":"6ASD4uAyG8y","DisplayText":"Progress Check","Question":"Identify the oil pressure gauge. Click on its correct location on the EICAS display.","Choices":[],"Answers":[],"Warning":"Correct answer text not found"},{"Course":"SY205","Number":8,"SlideId":"5mrhzQQhatw","DisplayText":"Progress Check","Question":"The pilot will know the oil pressure is out of limits because the EICAS display will _________.","Choices":["change color, generate a message on the CAS, illuminate the MASTER WARN or MASTER CAUT switchlight, and play an aural tone","generate a message on the CAS, illuminate the MASTER WARN or MASTER CAUT switchlight, and play an aural tone","go blank for 3 seconds","change color"],"Answers":["change color, generate a message on the CAS, illuminate the MASTER WARN or MASTER CAUT switchlight, and play an aural tone"],"Warning":""},{"Course":"SY205","Number":9,"SlideId":"6IET6fSiyYI","DisplayText":"Progress Check","Question":"True or false? Pressing the MASTER WARN switchlight extinguishes the lamp and the message on the CAS display.","Choices":["False","True"],"Answers":["False"],"Warning":""},{"Course":"SY205","Number":10,"SlideId":"6pQqZziUFI1","DisplayText":"Progress Check","Question":"True or false? Shutoff valves activated by the Firewall Shutoff Handle may be reset by pushing the handle back in.","Choices":["False","True"],"Answers":["True"],"Warning":""},{"Course":"SY205","Number":11,"SlideId":"65mQ8tMIZLZ","DisplayText":"Progress Check","Question":"When testing the integrity of the fire warning system, you will know the system is working properly if _________ and the aural tone sounds.","Choices":["the FIRE and MASTER WARN annunciators illuminate","the FIRE DET switch returns to the neutral position","the MASTER CAUT annunciator illuminates","a green FIRE DET annunciator is illuminated"],"Answers":["the FIRE and MASTER WARN annunciators illuminate"],"Warning":""},{"Course":"SY206","Number":1,"SlideId":"5g5klkLqUvl","DisplayText":"Review Question","Question":"What three elements are necessary for engine operation?","Choices":[],"Answers":["Air Fuel Heat","Pasted Image (1388x975).emf"],"Warning":""},{"Course":"SY206","Number":2,"SlideId":"6InNnfY4wQH","DisplayText":"Review Question","Question":"Given indications of abnormal start, what should you do?","Choices":[],"Answers":["Begin abort start procedure."],"Warning":""},{"Course":"SY206","Number":3,"SlideId":"6eTQrWgLzk0","DisplayText":"Review Question","Question":"What are the types of abnormal start?","Choices":[],"Answers":["Hot Hung No start"],"Warning":""},{"Course":"SY206","Number":4,"SlideId":"64sfEQou6Gj","DisplayText":"Review Question","Question":"What are the indications of a hot start?","Choices":[],"Answers":["High/Rapidly rising ITT Lower N1 Lower NP"],"Warning":""},{"Course":"SY206","Number":5,"SlideId":"6kuknwcyisC","DisplayText":"Review Question","Question":"What are the indications of a hung start?","Choices":[],"Answers":["Slow rising ITT Lower N1 Lower NP"],"Warning":""},{"Course":"SY206","Number":6,"SlideId":"5cYmjLum0FT","DisplayText":"Review Question","Question":"What are the indications of no start?","Choices":[],"Answers":["No ITT indication Lower N1 No NP indication No torque indication"],"Warning":""},{"Course":"SY206","Number":7,"SlideId":"5hupSCbujnv","DisplayText":"Review Question","Question":"What are some possible display indications of engine failure in-flight?","Choices":[],"Answers":["Initial Indications: Loss of power and airspeed Rapid decay of N1, torque, and ITT MASTER WARN lights and tone Propeller moves toward feather Accompanying Indications: Rapidly decreasing ITT, NP Lower-than-normal oil pressure Engine noise GEN, FUEL PX, OIL PX, OBOGS FAIL messages Possibly PMU FAIL and CKPT PX messages"],"Warning":""},{"Course":"SY206","Number":8,"SlideId":"6PFuQt8YN5m","DisplayText":"Review Question","Question":"What are the indications of PMU failure?","Choices":[],"Answers":["Power step change PMU FAIL message MASTER WARN light Aural tone"],"Warning":""},{"Course":"SY206","Number":9,"SlideId":"5jGVa8dzWhf","DisplayText":"Review Question","Question":"What are the indications of uncommanded propeller feather?","Choices":[],"Answers":["Rapid loss of power High torque Lower NP Possible PMU FAIL/PMU STATUS messages Engine vibration Engine noise"],"Warning":""},{"Course":"SY206","Number":10,"SlideId":"6c4GB1etKUA","DisplayText":"Review Question","Question":"What are some sensory indications of engine fire in-flight?","Choices":[],"Answers":["See smoke or flames Smell oil burning Hear unusual sounds Feel engine vibration or roughness"],"Warning":""},{"Course":"SY207","Number":1,"SlideId":"6oE3VFxAQde","DisplayText":"Progress Check","Question":"Which T-6C environmental system is an engine-driven vapor cycle system?","Choices":["ventilation","air conditioning","canopy defogging","heating"],"Answers":["air conditioning"],"Warning":""},{"Course":"SY207","Number":2,"SlideId":"6gxVGKKafjj","DisplayText":"Progress Check","Question":"Click on the control which determines how much hot engine bleed air is provided to the environmental system, then click Submit.","Choices":[],"Answers":[],"Warning":"Correct answer text not found"},{"Course":"SY207","Number":3,"SlideId":"5kUMs1cskdD","DisplayText":"Progress Check","Question":"Click on the control which determines the amount of warm bleed air to be mixed with cooled air supplied by the heat exchanger for ducting to the cockpit, then click Submit.","Choices":[],"Answers":[],"Warning":"Correct answer text not found"},{"Course":"SY207","Number":4,"SlideId":"5iztAXhNKV1","DisplayText":"Progress Check","Question":"True or false? In order for the air conditioner compressor to be engaged, both the AIR COND and DEFOG switches must be in the ON position.","Choices":["False","True"],"Answers":["False"],"Warning":""},{"Course":"SY207","Number":5,"SlideId":"6F3IsV2BeL8","DisplayText":"Progress Check","Question":"The _________ controls provide power to the front and rear cockpit blowers which supply airflow through the air conditioning vents.","Choices":["temperature","fresh air blower","evaporator condenser","evaporator blower"],"Answers":["evaporator blower"],"Warning":""},{"Course":"SY207","Number":6,"SlideId":"5r6RiWoSpaT","DisplayText":"Progress Check","Question":"On the ground, the fresh air blower is activated by the _________.","Choices":["EVAP BLWR switch","RAM AIR FLOW switch","weight-on-wheels switch on the landing gear","TEMP CONTROL switch"],"Answers":["weight-on-wheels switch on the landing gear"],"Warning":""},{"Course":"SY207","Number":7,"SlideId":"5hXpePj0Tuh","DisplayText":"Progress Check","Question":"Fresh air is distributed to the main cockpit duct and then output through the _________.","Choices":["instrument panel vents","air conditioner outlets","cockpit side panel vent","footwarmers or defog vents"],"Answers":["footwarmers or defog vents"],"Warning":""},{"Course":"SY207","Number":8,"SlideId":"6NXcJpsWwIk","DisplayText":"Progress Check","Question":"While in flight, cool air from the _________ passes through the heat exchanger, draws heat from the bleed air, and is then exhausted through a vent in the lower right cowling.","Choices":["engine compressor","heating system ejector","ram air inlet","cockpit"],"Answers":["ram air inlet"],"Warning":""},{"Course":"SY207","Number":9,"SlideId":"6fVtXTNp9MK","DisplayText":"Progress Check","Question":"True or false? As the temperature control is turned toward COLD, the heat exchanger bypass valve opens up and more cool air from the heat exchanger passes into the cockpit.","Choices":["False","True"],"Answers":["False"],"Warning":""},{"Course":"SY207","Number":10,"SlideId":"5WnsS8mYn8R","DisplayText":"Progress Check","Question":"Which control, when activated, prevents engine compartment fumes from entering the cockpit through the environmental system after an engine shutdown situation?","Choices":["BLEED AIR INFLOW switch","Firewall shutoff handle","EVAP BLWR switch","Auto temperature control"],"Answers":["Firewall shutoff handle"],"Warning":""},{"Course":"SY207","Number":11,"SlideId":"6c9KU82Hv9Q","DisplayText":"Progress Check","Question":"Cockpit air temperature is automatically adjusted between _________ Fahrenheit with the TEMP CONTROL switch set to AUTO.","Choices":["70° to 95°","60° to 90°","50° to 85°","40° to 70°"],"Answers":["60° to 90°"],"Warning":""},{"Course":"SY207","Number":12,"SlideId":"5eSfioTbRYF","DisplayText":"Progress Check","Question":"True or false? When the DEFOG switch is ON and the Vent Control Lever is set to CANOPY, a higher volume of bleed air in the system causes ambient cockpit air to be drawn into the heating system ejector, mixed with bleed air in the main cockpit duct and flow downstream to the windshield and canopy defog ducts.","Choices":["False","True"],"Answers":["True"],"Warning":""},{"Course":"SY207","Number":13,"SlideId":"5hZHhEUn03g","DisplayText":"Progress Check","Question":"Placing the vent lever in the _________ position causes the valve at the front cockpit assembly to direct the warm air into the windshield defog duct.","Choices":["NORM","FOOT","CANOPY","HEAT"],"Answers":["CANOPY"],"Warning":""},{"Course":"SY207","Number":14,"SlideId":"6ih6KjPRSvN","DisplayText":"Progress Check","Question":"Click on the control which opens the bi-level flow control bypass valve and provides a higher volume of bleed air flow to the heating system ejector.","Choices":[],"Answers":[],"Warning":"Correct answer text not found"},{"Course":"SY207","Number":15,"SlideId":"68u1ODD4511","DisplayText":"Progress Check","Question":"The air conditioning system only operates when the engine is on and functioning with the _________ and the _________.","Choices":["battery switch ON; AIR COND or DEFOG switch OFF","generator on-line; AIR COND or DEFOG switch OFF","battery switch ON; AIR COND or DEFOG switch ON","generator on-line; AIR COND or DEFOG switch ON"],"Answers":["generator on-line; AIR COND or DEFOG switch ON"],"Warning":""},{"Course":"SY207","Number":16,"SlideId":"5opIPrAyMWg","DisplayText":"Progress Check","Question":"Click on the air conditioner component which converts vaporized refrigerant to a liquid, then click Submit.","Choices":["Pasted Image (1230x808).emf"],"Answers":[],"Warning":"Correct answer text not found"},{"Course":"SY207","Number":17,"SlideId":"6aOeyNr2Jpm","DisplayText":"Progress Check","Question":"A panel in the _________ side of the fuselage allows access for maintenance personnel to recharge the system refrigerant when necessary.","Choices":["forward right","forward left","aft right","aft left"],"Answers":["forward right"],"Warning":""},{"Course":"SY207","Number":18,"SlideId":"6bfG5eYAocd","DisplayText":"Progress Check","Question":"The _________ will produce airflow at up to 350 cubic feet per minute at the HI setting.","Choices":["ram air blower","ejector bypass valve","foot warmers","evaporator blowers"],"Answers":["evaporator blowers"],"Warning":""},{"Course":"SY208","Number":1,"SlideId":"6cmODCGzuZS","DisplayText":"Progress Check","Question":"Cockpit pressure altitude is maintained by the control valve at _________ feet until a cockpit pressure differential of 3.6 ± 0.2 psi is reached at 18,069 feet.","Choices":["15,000","12,000","10,000","8,000"],"Answers":["8,000"],"Warning":""},{"Course":"SY208","Number":2,"SlideId":"5pe3NYIjsuz","DisplayText":"Progress Check","Question":"Click on the PRESSURIZATION switch position which opens the control valve, allows bleed air inflow to continue but does not open the fresh air valve.","Choices":[],"Answers":[],"Warning":"Correct answer text not found"},{"Course":"SY208","Number":3,"SlideId":"5rmcsjG6lmN","DisplayText":"Progress Check","Question":"The safety valve receives a signal from the ΔP regulator if the cockpit pressure differential exceeds _________ psi.","Choices":["4.3","4.0","3.9","3.6"],"Answers":["4.0"],"Warning":""},{"Course":"SY208","Number":4,"SlideId":"5gwK2em2AvJ","DisplayText":"Progress Check","Question":"The anti-G valve on the left side console in each cockpit is opened by _________ during maneuvers.","Choices":["decreasing positive G force","increasing positive G force","decreasing negative G force","increasing negative G force"],"Answers":["increasing positive G force"],"Warning":""},{"Course":"SY208","Number":5,"SlideId":"6elIOfl5vWG","DisplayText":"Progress Check","Question":"The T-6C anti-G system helps maintain _________ during high G maneuvers.","Choices":["aircraft altitude","aircraft attitude","normal blood circulation","flight control coordination"],"Answers":["normal blood circulation"],"Warning":""},{"Course":"SY208","Number":6,"SlideId":"6WIMYuyoAJQ","DisplayText":"Progress Check","Question":"Click on the regulator lever which controls system electrical power and oxygen flow, then click Submit.","Choices":["Pasted Image (925x282).emf"],"Answers":["Pasted Image (925x421).emf"],"Warning":""},{"Course":"SY208","Number":7,"SlideId":"5k9hlvc8fWD","DisplayText":"Progress Check","Question":"An _________ is installed near each regulator which allows the pilot to continue breathing ambient cockpit air if OBOGS should fail.","Choices":["oxygen cutoff valve","anti-suffocation valve","anti-fail valve","ambient air supply valve"],"Answers":["anti-suffocation valve"],"Warning":""},{"Course":"SY208","Number":8,"SlideId":"61lcFiqOWvj","DisplayText":"Progress Check","Question":"Approximately three minutes after OBOGS is activated, the _________ message will display if there is a system failure during the system self test.","Choices":["BIT FAIL","OBOGS FAIL","OBOGS TEMP","OBOGS TEST"],"Answers":["OBOGS FAIL"],"Warning":""},{"Course":"SY208","Number":9,"SlideId":"6QnuUo9eM28","DisplayText":"Progress Check","Question":"True or false? The emergency oxygen cylinder is considered charged if the pointer is at 1500 psi or above.","Choices":["True","False"],"Answers":["False"],"Warning":""},{"Course":"SY209","Number":1,"SlideId":"6qxkdoTnOHR","DisplayText":"Progress Check","Question":"Which canopy section(s) provide enhanced birdstrike protection?","Choices":["All sections","Front and rear transparency","Windscreen and front transparency","Windscreen only"],"Answers":["Windscreen and front transparency"],"Warning":""},{"Course":"SY209","Number":2,"SlideId":"6lmwfG65C4J","DisplayText":"Progress Check","Question":"The ______________________ can be used for emergency egress if the canopy cannot be opened.","Choices":["Match the statements with the system titles below.","The ______________________ locks and unlocks the canopy.","The ______________________ prevents cabin air leaks.","The ______________________ controls condensation and improves pilot visibility.","canopy fracturing system","locking/latching system","defog system","sealing system"],"Answers":["1. locking/latching system, 2. sealing system, 3. canopy fracturing system, 4. defog system"],"Warning":""},{"Course":"SY209","Number":3,"SlideId":"6azUQrFl7wK","DisplayText":"Progress Check","Question":"Click on the graphic that shows the canopy lock release lever, then click Submit.","Choices":["Pasted Image (925x608).emf","Image 9.emf"],"Answers":[],"Warning":"Correct answer text not found"},{"Course":"SY209","Number":4,"SlideId":"6Ft3PaiwKB1","DisplayText":"Progress Check","Question":"Read the following steps. Select the choice that identifies what these steps allow you to do: Press and hold the unlock button. Rotate the exterior canopy handle clockwise to OPEN. Lift the canopy to its full 90° open position.","Choices":["Close the canopy from the inside.","Open the canopy from the inside.","Close the canopy from the outside.","Open the canopy from the outside."],"Answers":["Open the canopy from the outside."],"Warning":""},{"Course":"SY209","Number":5,"SlideId":"6eTR3z3dDst","DisplayText":"Progress Check","Question":"When closing the canopy from the inside, the canopy has been properly latched when the _________.","Choices":["CANOPY CAS advisory changes from red to green","mechanical green indicator is visible","latch handle cannot be moved","mechanical red indicator is visible"],"Answers":["mechanical green indicator is visible"],"Warning":""},{"Course":"SY209","Number":6,"SlideId":"6qcWPEoEmty","DisplayText":"Progress Check","Question":"What indications will you get if the canopy is unlocked?","Choices":["MASTER WARN annunciator, UNLOCK CAS caution advisory, and aural tone.","MASTER WARN annunciator, CANOPY CAS caution advisory, and aural tone.","MASTER CAUTION annunciator, UNLOCK CAS caution advisory, and aural tone.","MASTER CAUTION annunciator, CANOPY CAS caution advisory, and aural tone."],"Answers":["MASTER WARN annunciator, CANOPY CAS caution advisory, and aural tone"],"Warning":""},{"Course":"SY209","Number":7,"SlideId":"5hcAKplGfXX","DisplayText":"Progress Check","Question":"The canopy shall not be opened on the ground when surface winds exceed _______ knots.","Choices":["40","30","20","10"],"Answers":["40"],"Warning":""},{"Course":"SY209","Number":8,"SlideId":"6jYdgy1KV7s","DisplayText":"Progress Check","Question":"The CFS functions automatically during ejection or can be activated by _________ .","Choices":["none of the above","only internal.","only external.","only seat handle."],"Answers":["internal or external"],"Warning":""},{"Course":"SY209","Number":9,"SlideId":"64RQ4j3ffA1","DisplayText":"Progress Check","Question":"Which control will fracture the front cockpit canopy transparency only?","Choices":["Left external CFS handle","Front cockpit CFS handle","Right external CFS handle","Rear cockpit CFS handle"],"Answers":["Front cockpit CFS handle"],"Warning":""},{"Course":"SY209","Number":10,"SlideId":"6W8KaVMxAmV","DisplayText":"Progress Check","Question":"True or false? In order for the CFS to be activated, aircraft electrical power must be available.","Choices":["False","True"],"Answers":["False"],"Warning":""},{"Course":"SY209","Number":11,"SlideId":"5k0KDMu2voa","DisplayText":"Progress Check","Question":"FLSC is used on the front transparency instead of MDC because _____________.","Choices":["FLSC is “see through” allowing better front cockpit visibility","MDC causes electrical interference with front cockpit instruments","FLSC, though less powerful than MDC, is sufficient to cut the thinner front transparency","FLSC is more powerful than MDC and can cut the thicker front transparency"],"Answers":["FLSC is more powerful than MDC and can cut the thicker front transparency"],"Warning":""},{"Course":"SY209","Number":12,"SlideId":"68MjcIaz5nA","DisplayText":"Progress Check","Question":"Click on the control that activates the CFS system for this cockpit, then click Submit.","Choices":[],"Answers":[],"Warning":"Correct answer text not found"},{"Course":"SY210","Number":1,"SlideId":"5nHo2zrbdTj","DisplayText":"Progress Check","Question":"The pilot would use the MOR Handle to separate from the seat _________.","Choices":["over mountainous terrain above 8,000 feet MSL","while the seat is in the aircraft","while on the ground","over water"],"Answers":["over mountainous terrain above 8,000 feet MSL"],"Warning":""},{"Course":"SY210","Number":2,"SlideId":"6ASOyu87Nbz","DisplayText":"Progress Check","Question":"When properly secured, you will be restrained with the torso harness connected to the risers. Also ensure the ______________ are secure.","Choices":["lap belt and leg restraints","shoulder belts and main sling","oxygen connectors and carrier strap","shoulder harness and saddle"],"Answers":["lap belt and leg restraints"],"Warning":""},{"Course":"SY210","Number":3,"SlideId":"6rf7piVKD9Z","DisplayText":"Progress Check","Question":"What is the purpose of the leg restraint system?","Choices":["Avoid constriction during ejection","Ensure freedom of movement during ejection","Prevent the legs from flailing during ejection","Prevent movement about the cockpit during flight"],"Answers":["Prevent the legs from flailing during ejection"],"Warning":""},{"Course":"SY210","Number":4,"SlideId":"6l4TPTIIH8F","DisplayText":"Progress Check","Question":"During ejection, emergency oxygen is provided _________.","Choices":["until seat-pilot separation or until it is turned off","for about 10 minutes or until seat-pilot separation","for about 10 minutes and after seat-pilot separation","for about 10 minutes or until turned off"],"Answers":["for about 10 minutes or until seat-pilot separation"],"Warning":""},{"Course":"SY210","Number":5,"SlideId":"5neWL2lt8WO","DisplayText":"Progress Check","Question":"During ejection, what happens in the event the canopy fracturing system (CFS) fails?","Choices":["The CFS must be reset.","The breaker headbox will shatter the canopy as the seat moves up the catapult rails.","The canopy breaker will penetrate the canopy transparency as the seat moves up the rails.","The ejection sequence is aborted."],"Answers":["The canopy breaker will penetrate the canopy transparency as the seat moves up the rails."],"Warning":""},{"Course":"SY210","Number":6,"SlideId":"6iQQnfkyyb9","DisplayText":"Progress Check","Question":"What happens when the ISS is set to BOTH?","Choices":["No matter who pulls the handle first, the front seat will eject before the back seat.","The front seat will eject first if the front handle is pulled first.","The rear seat will always eject first.","The seat that pulls the ejection handle first will eject first."],"Answers":["The rear seat will always eject first."],"Warning":""},{"Course":"SY210","Number":7,"SlideId":"5qqMTpcoXfR","DisplayText":"Progress Check","Question":"During the ejection process, movement of the seat is first initiated by _________.","Choices":["detonation of the rocket motor propellant","detonated gas pressure","mechanical catapult thrust","explosive hydraulic pressure"],"Answers":["detonated gas pressure"],"Warning":""},{"Course":"SY210","Number":8,"SlideId":"5pc92eel986","DisplayText":"Progress Check","Question":"What are the three factors affecting the effectiveness of the ejection system?","Choices":["Dive angle, bank angle, and sink rate","Dive speed, rate of bank, and sink rate","Dive angle, bank angle, and climb rate","Dive speed, bank angle, and climb rate"],"Answers":["Dive angle, bank angle, and sink rate"],"Warning":""},{"Course":"SY210","Number":9,"SlideId":"6Wy8kLrvb6z","DisplayText":"Progress Check","Question":"Why is it a good practice to eject from the aircraft in a level flight attitude?","Choices":["Ensure little or no sink rate","Avoid flying debris and rocket motor blast","Ensure a clear path away from the airframe","Avoid a collision of the front and rear ejection seats"],"Answers":["Ensure little or no sink rate"],"Warning":""},{"Course":"SY210","Number":10,"SlideId":"5pmFBdnbj9j","DisplayText":"Progress Check","Question":"What happens if the SSK Selector is set to AUTO?","Choices":["The pilot must pull the manual release handle marked KIT RELEASE to the SSK.","The pilot must wait 4.5 seconds until the SSK is lowered.","The pilot must use the manual release handle marked KIT RELEASE and wait 4 seconds.","The SSK will deploy 4.0 seconds after seat-pilot separation."],"Answers":["The SSK will deploy 4.0 seconds after seat-pilot separation."],"Warning":""},{"Course":"SY212","Number":1,"SlideId":"6ooXykjiCLH","DisplayText":"Review Question","Question":"Which switch controls the flow of fresh air to the cockpit during ground operations and unpressurized flight?","Choices":[],"Answers":["The RAM AIR FLOW switch on the Environmental Control Panel controls the position of the fresh air valve and thus the amount of air flow."],"Warning":""},{"Course":"SY212","Number":2,"SlideId":"5Y2Y2w4LOYo","DisplayText":"Review Question","Question":"True or false? The AIR COND switch is available in both cockpits and is used to activate the air conditioner compressor.","Choices":[],"Answers":["False. The AIR COND switch is located only in the front cockpit on the environmental control panel."],"Warning":""},{"Course":"SY212","Number":3,"SlideId":"63hpa8zMhud","DisplayText":"Review Question","Question":"True or false? Placing the vent control lever in the CANOPY position opens the defog (bi-level flow controls bypass) valve.","Choices":[],"Answers":["False. The defog valve is opened by placing the DEFOG switch in the ON position."],"Warning":""},{"Course":"SY212","Number":4,"SlideId":"5uENh1p2HuQ","DisplayText":"Review Question","Question":"Which cockpit control and duct component controls whether warm bleed air is routed to the footwarmers or defog outlets?","Choices":[],"Answers":["The front cockpit vent control lever adjusts the position of the cockpit selector valves to route warm air to either the footwarmers or the defog outlets."],"Warning":""},{"Course":"SY212","Number":5,"SlideId":"6reHEfkVrCW","DisplayText":"Review Question","Question":"True or false? The Temperature Control Switch Knob on the Environmental Control Panel controls the temperature of both heating and defogging air.","Choices":["Pasted Image (1387x939).emf"],"Answers":["True. The switch knob controls the position of the heat exchanger bypass valve which determines the temperature of air for both heating and defogging."],"Warning":""},{"Course":"SY212","Number":6,"SlideId":"6jMZKZCr3He","DisplayText":"Review Question","Question":"If cockpit pressure differential exceeds 4.0 psi, the ∆P regulator sends a signal to the safety valve. What does the safety valve do?","Choices":["Pasted Image (1845x1212).emf"],"Answers":["The safety valve will open to relieve excess cockpit pressure, regulating the pressure at 4.0 psi."],"Warning":""},{"Course":"SY212","Number":7,"SlideId":"6KvZGDhNUBA","DisplayText":"Review Question","Question":"A cockpit pressure differential of 3.6 psi is normally reached at what altitude?","Choices":[],"Answers":["18,069 feet","Pasted Image (1387x609).emf"],"Warning":""},{"Course":"SY212","Number":8,"SlideId":"5YnzC25fUlV","DisplayText":"Review Question","Question":"True or false? Pressure for the anti-G system is supplied from an electrically driven pump.","Choices":[],"Answers":["False. System pressure is supplied by the engine right side bleed air port.","Pasted Image (1387x1212).emf"],"Warning":""},{"Course":"SY212","Number":9,"SlideId":"5mCTPgbTpGa","DisplayText":"Review Question","Question":"Which oxygen pressure regulator concentration lever position supplies the highest possible oxygen concentration?","Choices":[],"Answers":["The MAX position","Pasted Image (1387x418).emf"],"Warning":""},{"Course":"SY212","Number":10,"SlideId":"5yKnTTXN3uS","DisplayText":"Review Question","Question":"When activated, the emergency oxygen bottle will supply oxygen for how long?","Choices":["Pasted Image (1387x728).emf"],"Answers":["Approximately 10 minutes"],"Warning":""},{"Course":"SY212","Number":11,"SlideId":"5X1gvhRP7LU","DisplayText":"Review Question","Question":"When is the canopy pressure seal inflated?","Choices":["Pasted Image (1848x1011).emf"],"Answers":["The seal is automatically inflated when bleed air inflow is available and aircraft weight is off the right main landing gear."],"Warning":""},{"Course":"SY212","Number":12,"SlideId":"5wQd4hb85QS","DisplayText":"Review Question","Question":"True or false? Aircraft electrical power must be available for the canopy fracturing system to function.","Choices":["Pasted Image (1388x624).emf"],"Answers":["False. The CFS requires no electricity to function.","Pasted Image (1387x624).emf"],"Warning":""},{"Course":"SY212","Number":13,"SlideId":"5sZOyugT6Xv","DisplayText":"Review Question","Question":"The T-6C Martin-Baker ejection seat is a zero-zero seat usable up to what altitude and airspeed?","Choices":[],"Answers":["35,000 feet and 370 KIAS","Pasted Image (1387x867).emf"],"Warning":""},{"Course":"SY212","Number":14,"SlideId":"69evfJvJ9y0","DisplayText":"Review Question","Question":"How would you deploy the parachute if the automatic system fails?","Choices":["Pasted Image (1388x828).emf"],"Answers":["Use the manual override (MOR) handle on the right side of the seat bucket.","Pasted Image (1387x606).emf"],"Warning":""},{"Course":"SY212","Number":15,"SlideId":"6ndLCRkbj28","DisplayText":"Review Question","Question":"Illumination of the CKPT PX warning message indicates what?","Choices":[],"Answers":["Cockpit pressure exceeding 3.9 ± 0.1 psi, indicating a problem in the pressurization outflow system.","Pasted Image (1388x507).emf"],"Warning":""},{"Course":"SY212","Number":16,"SlideId":"6hciUpN9NvK","DisplayText":"Review Question","Question":"The CKPT ALT caution message is illuminated, indicating the cockpit altitude has exceeded 19,000 feet. What ∆P reading should you expect to see?","Choices":["Pasted Image (1387x611).emf"],"Answers":["∆P less than 3.6. Should expect 0.","Pasted Image (1388x611).emf"],"Warning":""},{"Course":"SY212","Number":17,"SlideId":"6itQJo3Uofq","DisplayText":"Review Question","Question":"An OBOGS FAIL warning message should be accompanied by what other panel indication?","Choices":[],"Answers":["A flashing MASTER WARN switchlight on the instrument panel."],"Warning":""},{"Course":"SY213","Number":1,"SlideId":"6O8MmaPFHhC","DisplayText":"Progress Check","Question":"What action controls the dispensing of smoke oil to the engine’s right exhaust stack?","Choices":["Pressing and releasing either PCL Smoke/Cage/Uncage pushbutton","Turn the Battery Switch ON and press the Cage/Uncage button on the PCL","Pressing the Smoke Indicator/Switch then the Forward cockpit PCL Smoke/Cage/Uncage pushbutton","Pressing and releasing the Smoke Indicator/Switch"],"Answers":["Pressing and releasing either PCL Smoke/Cage/Uncage pushbutton"],"Warning":""},{"Course":"SY213","Number":2,"SlideId":"6brlIAmM6fy","DisplayText":"Progress Check","Question":"What Smoke/Indicator annunciator(s) illuminate when the Battery is switched ON?","Choices":["SMOKE, RDY, and ACT","SMOKE and RDY","SMOKE Only","SMOKE and ACT"],"Answers":["SMOKE Only"],"Warning":""},{"Course":"SY213","Number":3,"SlideId":"6P9TMHnIED9","DisplayText":"Progress Check","Question":"What action is taken to energize the Smoke System inflight?","Choices":["Press the Smoke/Indicator Switch on the rear cockpit instrument panel","Press the Cage/Uncage button on the PCL in the front cockpit","Press the Smoke/Indicator Switch on the front instrument panel","Press the Cage/Uncage button on the PCL in the rear cockpit"],"Answers":["Press the Smoke/Indicator Switch on the front instrument panel"],"Warning":""},{"Course":"SY213","Number":4,"SlideId":"5gBZNyqjJNp","DisplayText":"Progress Check","Question":"When is paraffinic oil pumped into the engine’s right exhaust stack to create a highly visible smoke trail?","Choices":["When the pilot in the front cockpit presses the Smoke/Indicator Annunciator","When the pilot in the rear cockpit presses and releases the Cage/Uncage button on the PCL","When the pilot in the front cockpit presses and releases the Cage/Uncage button on the PCL","When the Smoke/Cage/Uncage pushbutton on either PCL is pushed"],"Answers":["Both B and C - “When the Smoke/Cage/Uncage pushbutton on either PCL is pushed"],"Warning":""},{"Course":"SY213","Number":5,"SlideId":"6AZP5OqfoQK","DisplayText":"Progress Check","Question":"How long after smoke system use should you let the engine run to minimize a smoke oil fire caused by potential residual smoke oil in the supply line?","Choices":["60 Seconds","A minimum of two minutes","A minimum of five minutes","A maximum of 10 minutes"],"Answers":["A minimum of five minutes"],"Warning":""},{"Course":"SY213","Number":6,"SlideId":"6K4SooAFxjv","DisplayText":"Progress Check","Question":"Which oil is NOT approved for use in the smoke system?","Choices":["Shell Carnea E10 or E15","Shell Vitrea 13","Valvoline SAE 5W-30","BP Enerpar (viscosity 10)"],"Answers":["Valvoline SAE 5W-30"],"Warning":""},{"Course":"SY214","Number":1,"SlideId":"5lhEA9n5H3H","DisplayText":"Progess Check","Question":"The CVR function simultaneously records audio inputs from ___ for up to ___ minutes?","Choices":["both pilots audio selections and an area mic, 120","three area mics, 90","both pilots, 120","area mic and engine mic, 60"],"Answers":["both pilots audio selections and an area mic, 120"],"Warning":""},{"Course":"SY214","Number":2,"SlideId":"6ncZNzhvKfm","DisplayText":"Progess Check","Question":"Where is the CVDR Test Switch/Annunciator located?","Choices":["Left console in the forward cockpit","Right side of the front instrument panel just beneath the glareshield","Left console in the rear cockpit","Right console in the forward cockpit"],"Answers":["Left console in the front cockpit"],"Warning":""},{"Course":"SY214","Number":3,"SlideId":"6CodeZv2aSV","DisplayText":"Progess Check","Question":"A successful test of the MADRAS CVDR system is indicated by?","Choices":["EICAS message, “CVDR PASS” in white","Flashing red CVR/FDR","Four consecutive one second audio tones in both pilot headsets","Audio message, “CVDR SYSTEM TEST OK”"],"Answers":["Four consecutive one second audio tones in both pilot headsets"],"Warning":""}]
</script>
<script>
let questions=[],activeCourse='ALL';
const quiz=document.getElementById('quiz'),coursesEl=document.getElementById('courses'),summary=document.getElementById('summary'),search=document.getElementById('search');
const norm=v=>String(v||'').trim().toLowerCase();
function escapeHtml(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function loadQuestions(){return JSON.parse(document.getElementById('quiz-data').textContent);}
function renderFilters(){
  const list=['ALL',...new Set(questions.map(q=>q.Course))];
  coursesEl.innerHTML=list.map(c=><button class="course-filter " type="button" data-course=""></button>).join('');
  coursesEl.querySelectorAll('button').forEach(b=>b.onclick=()=>{activeCourse=b.dataset.course;render();});
}
function filtered(){
  const term=norm(search.value);
  return questions.filter(q=>{
    if(activeCourse!=='ALL'&&q.Course!==activeCourse)return false;
    if(!term)return true;
    return norm([q.Course,q.Number,q.SlideId,q.DisplayText,q.Question,...(q.Choices||[]),...(q.Answers||[])].join(' ')).includes(term);
  });
}
function card(q,i){
  const choices=(q.Choices||[]).map((c,idx)=><button class="choice" type="button" data-choice=""><span class="idx">.</span><span></span></button>).join('');
  const answer=(q.Answers&&q.Answers.length)?q.Answers.join('; '):'No extracted answer text';
  const warn=q.Warning?<div class="warn"></div>:'';
  return <article class="card" data-answer="">
    <div class="meta"><span class="pill"></span><span class="pill">Q</span><span class="pill"></span><span class="pill">Slide </span></div>
    <div class="question"></div>
    <div class="choices"></div>
    <div class="actions"><button class="submit" type="button">Submit answer</button><button class="reset" type="button">Try again</button></div>
    <div class="feedback" hidden></div><div class="answer" hidden>Answer: <span class="ok"></span></div>
  </article>;
}
function render(){
  const items=filtered();
  summary.innerHTML=<span>Total: </span><span>Showing: </span><span>Courses: </span>;
  quiz.innerHTML=items.length?items.map(card).join(''):'<div class="empty">No questions match this filter.</div>';
  quiz.querySelectorAll('.card').forEach(wireCard);
  renderFilters();
}
function wireCard(card){
  let picked='';
  const ans=norm(card.dataset.answer).replace(/\s+/g,' ');
  const fb=card.querySelector('.feedback'),answer=card.querySelector('.answer');
  card.querySelectorAll('.choice').forEach(btn=>btn.onclick=()=>{card.querySelectorAll('.choice').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');picked=btn.dataset.choice;fb.hidden=true;answer.hidden=true;});
  card.querySelector('.submit').onclick=()=>{answer.hidden=false;fb.hidden=false;const buttons=[...card.querySelectorAll('.choice')];buttons.forEach(b=>{const ok=ans.includes(norm(b.dataset.choice).replace(/\s+/g,' '));b.classList.toggle('correct',ok);b.classList.toggle('wrong',picked===b.dataset.choice&&!ok);});if(!buttons.length){fb.textContent='Review the answer below.';fb.className='feedback ok';return;}if(!picked){fb.textContent='Select an answer first.';fb.className='feedback bad';return;}const good=ans.includes(norm(picked).replace(/\s+/g,' '));fb.textContent=good?'Correct':'Not quite';fb.className='feedback '+(good?'ok':'bad');};
  card.querySelector('.reset').onclick=()=>{picked='';fb.hidden=true;answer.hidden=true;card.querySelectorAll('.choice').forEach(b=>b.classList.remove('selected','correct','wrong'));};
}
search.oninput=render;document.getElementById('resetFilters').onclick=()=>{activeCourse='ALL';search.value='';render();};
try{questions=loadQuestions();render();}catch(err){quiz.innerHTML='<div class="empty">Could not load quiz data: '+escapeHtml(err.message)+'</div>';}
</script>
